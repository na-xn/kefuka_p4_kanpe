name: build-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # インストーラ(msi/NSIS)は作らず、ダブルクリック起動の単体 exe のみビルド
      - name: Build Tauri app (exe only)
        run: pnpm tauri build --no-bundle

      # exe と「ユーザー向け README（release/README.md）」だけをフラットに集める
      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p out
          cp src-tauri/target/release/counter-topmost.exe out/
          cp release/README.md out/README.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: counter-topmost-windows
          path: out
          if-no-files-found: error

      # タグ push 時のみ: exe と README.md だけを添付した Draft Release を作成
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "out/counter-topmost.exe" \
            "out/README.md" \
            --title "${GITHUB_REF_NAME}" \
            --draft
